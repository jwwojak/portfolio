site_url: https://jwwojak.github.io/portfolio/
site_name: Joe Wojak | Technical Writer

theme:
  name: material
  custom_dir: overrides
  icon:
    logo: material/file-document-multiple-outline
  favicon: images/favicon/file-document-multiple-outline.svg
  features:
    - navigation.indexes

plugins:
  - search
  - social

# --- Social links ---
extra:
  robots: noindex, nofollow
  sitemap: 
    enabled: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jwwojak
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/joewojak
    - icon: fontawesome/solid/paper-plane
      link: mailto:jwojak@gmail.com

extra_css:
  - stylesheets/extra.css

nav:
  - Hello World: index.md
  - Resume: resume.md
  - Writing Samples:
    - Writing Samples: writing-samples/index.md
    - Robotics Documentation: writing-samples/robotics.md
    - API Documentation: writing-samples/api-docs.md
    - Ad Tech Documentation:
          - Understanding Budget Distribution and Update Cycles: writing-samples/budget-updates.md
          - Understanding Budget Distribution in Data Centers: writing-samples/budget-distribution.md
          - Budget Updates and Delivery Delays: writing-samples/budget-delay.md
          # - Confidence Scores and Report Results: writing-samples/confidence-scores.md

copyright: Copyright &copy; 2026 Joe Wojak

markdown_extensions:
  - def_list
  - toc:
      title: Page contents
      permalink: True
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
